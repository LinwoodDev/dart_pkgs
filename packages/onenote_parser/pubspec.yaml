name: onenote_parser
description: Read Microsoft OneNote files from Dart and Flutter using onenote.rs.
version: 0.0.1
publish_to: none

environment:
  sdk: ^3.12.2

dependencies:
  flutter_rust_bridge: ^2.13.0-beta.4
  flutter_rust_bridge_hooks: ^2.13.0-beta.4
  freezed_annotation: ^3.1.0
  uuid: any

dev_dependencies:
  build_runner: ^2.10.4
  freezed: ^3.2.5
  flutter_lints: ^6.0.0
  integration_test:
    sdk: flutter
